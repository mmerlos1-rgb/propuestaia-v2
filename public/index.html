<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PropuestaIA — Propuestas comerciales en 30 segundos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050a05;color:#e8f0e8;font-family:system-ui,sans-serif;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:700px;margin:0 auto}
h1{font-size:2.5rem;font-weight:800;color:#00e676;margin-bottom:.5rem}
p{color:#7a9a7a;margin-bottom:2rem}
.field{margin-bottom:1rem}
label{display:block;font-size:12px;font-weight:600;color:#7a9a7a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input,textarea,select{width:100%;padding:10px 14px;background:#0d1a0d;border:1px solid rgba(0,230,118,0.2);border-radius:8px;color:#e8f0e8;font-family:system-ui,sans-serif;font-size:14px;outline:none}
input:focus,textarea:focus,select:focus{border-color:#00e676}
textarea{min-height:80px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn{width:100%;padding:14px;background:#00e676;color:#050a05;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:1rem}
.btn:hover{background:#00ff7f}
.btn:disabled{background:#2a4a2a;color:#3a6a3a;cursor:not-allowed}
.result{display:none;margin-top:1.5rem;background:#0d1a0d;border:1px solid rgba(0,230,118,0.3);border-radius:12px;overflow:hidden}
.result-top{background:rgba(0,230,118,0.1);padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.result-top span{font-size:13px;font-weight:600;color:#00e676}
.copy{font-size:12px;padding:5px 14px;background:transparent;border:1px solid rgba(0,230,118,0.3);color:#00e676;border-radius:8px;cursor:pointer;font-family:system-ui,sans-serif}
.result-text{padding:1.25rem;font-size:14px;line-height:1.8;white-space:pre-wrap}
.spinner-wrap{display:none;text-align:center;padding:2rem;color:#7a9a7a}
.spinner{width:32px;height:32px;border:3px solid rgba(0,230,118,0.2);border-top-color:#00e676;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>PropuestaIA</h1>
  <p>Genera propuestas comerciales profesionales en 30 segundos con IA</p>

  <div class="row">
    <div class="field">
      <label>Tu empresa</label>
      <input id="myco" type="text" placeholder="Ej: Agencia Norte"/>
    </div>
    <div class="field">
      <label>Tu nombre</label>
      <input id="myname" type="text" placeholder="Ej: Carlos García"/>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Empresa cliente</label>
      <input id="client" type="text" placeholder="Ej: Restaurante La Brasa"/>
    </div>
    <div class="field">
      <label>Sector</label>
      <input id="sector" type="text" placeholder="Ej: Restauración"/>
    </div>
  </div>

  <div class="field">
    <label>Necesidad del cliente</label>
    <textarea id="need" placeholder="Ej: No tienen presencia en redes sociales..."></textarea>
  </div>

  <div class="field">
    <label>Servicio a ofrecer</label>
    <input id="service" type="text" placeholder="Ej: Gestión de redes sociales"/>
  </div>

  <div class="row">
    <div class="field">
      <label>Precio (€)</label>
      <input id="price" type="number" placeholder="499"/>
    </div>
    <div class="field">
      <label>Modalidad</label>
      <select id="mod">
        <option value="mensual">Suscripción mensual</option>
        <option value="pago único">Pago único</option>
        <option value="por proyecto">Por proyecto</option>
      </select>
    </div>
  </div>

  <button class="btn" id="genBtn" onclick="generar()">✦ Generar propuesta con IA</button>

  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    Generando tu propuesta...
  </div>

  <div class="result" id="result">
    <div class="result-top">
      <span>✓ Propuesta lista</span>
      <button class="copy" onclick="copiar()">Copiar</button>
    </div>
    <div class="result-text" id="resultText"></div>
  </div>
</div>

<script>
async function generar() {
  const myco = document.getElementById('myco').value || 'Mi Empresa';
  const myname = document.getElementById('myname').value || 'El equipo';
  const client = document.getElementById('client').value || 'el cliente';
  const sector = document.getElementById('sector').value || 'su sector';
  const need = document.getElementById('need').value || 'mejorar su negocio';
  const service = document.getElementById('service').value || 'nuestros servicios';
  const price = document.getElementById('price').value || '499';
  const mod = document.getElementById('mod').value;

  const btn = document.getElementById('genBtn');
  const spinner = document.getElementById('spinner');
  const result = document.getElementById('result');

  btn.disabled = true;
  spinner.style.display = 'block';
  result.style.display = 'none';

  const prompt = `Eres un experto redactor de propuestas comerciales B2B. Genera una propuesta COMPLETA y persuasiva.

Datos:
- Empresa: ${myco} (representada por ${myname})
- Cliente: ${client} (sector: ${sector})
- Problema del cliente: ${need}
- Servicio: ${service}
- Precio: ${price}€ (${mod})

Estructura:
1. Encabezado con fecha
2. Saludo personalizado
3. Diagnóstico del cliente
4. Solución propuesta
5. Entregables (4-5 puntos)
6. Inversión y modalidad
7. Por qué elegirnos (2 razones)
8. Próximos pasos
9. Firma de ${myname}

Sé concreto y personalizado. Máximo 400 palabras. Sin markdown.`;

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    const data = await resp.json();
    const data = await resp.json();
console.log('Respuesta:', JSON.stringify(data));
const text = data.content[0].text;
    document.getElementById('resultText').textContent = text;
    result.style.display = 'block';
    result.scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    document.getElementById('resultText').textContent = 'Error de conexión: ' + e.message;
    result.style.display = 'block';
  }

  spinner.style.display = 'none';
  btn.disabled = false;
}

function copiar() {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy');
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  });
}
</script>
</body>
</html>

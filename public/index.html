<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PropuestaIA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050a05;color:#e8f0e8;font-family:system-ui,sans-serif;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:700px;margin:0 auto}
h1{font-size:2.5rem;font-weight:800;color:#00e676;margin-bottom:.5rem}
p.sub{color:#7a9a7a;margin-bottom:2rem}
.field{margin-bottom:1rem}
label{display:block;font-size:12px;font-weight:600;color:#7a9a7a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input,textarea,select{width:100%;padding:10px 14px;background:#0d1a0d;border:1px solid rgba(0,230,118,0.2);border-radius:8px;color:#e8f0e8;font-family:system-ui,sans-serif;font-size:14px;outline:none}
input:focus,textarea:focus,select:focus{border-color:#00e676}
textarea{min-height:80px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn{width:100%;padding:14px;background:#00e676;color:#050a05;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;margin-top:1rem}
.btn:hover{background:#00ff7f}
.btn:disabled{background:#2a4a2a;color:#3a6a3a;cursor:not-allowed}
.result{display:none;margin-top:1.5rem;background:#0d1a0d;border:1px solid rgba(0,230,118,0.3);border-radius:12px;overflow:hidden}
.result-top{background:rgba(0,230,118,0.1);padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.result-top span{font-size:13px;font-weight:600;color:#00e676}
.copy-btn{font-size:12px;padding:5px 14px;background:transparent;border:1px solid rgba(0,230,118,0.3);color:#00e676;border-radius:8px;cursor:pointer;font-family:system-ui,sans-serif}
.result-text{padding:1.25rem;font-size:14px;line-height:1.8;white-space:pre-wrap}
.loading{display:none;text-align:center;padding:2rem;color:#7a9a7a}
.spinner{width:32px;height:32px;border:3px solid rgba(0,230,118,0.2);border-top-color:#00e676;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>PropuestaIA</h1>
  <p class="sub">Genera propuestas comerciales profesionales en 30 segundos con IA</p>
  <div class="row">
    <div class="field"><label>Tu empresa</label><input id="f1" type="text" placeholder="Agencia Norte"/></div>
    <div class="field"><label>Tu nombre</label><input id="f2" type="text" placeholder="Carlos García"/></div>
  </div>
  <div class="row">
    <div class="field"><label>Empresa cliente</label><input id="f3" type="text" placeholder="Restaurante La Brasa"/></div>
    <div class="field"><label>Sector</label><input id="f4" type="text" placeholder="Restauración"/></div>
  </div>
  <div class="field"><label>Necesidad del cliente</label><textarea id="f5" placeholder="No tienen presencia en redes sociales..."></textarea></div>
  <div class="field"><label>Servicio a ofrecer</label><input id="f6" type="text" placeholder="Gestión de redes sociales"/></div>
  <div class="row">
    <div class="field"><label>Precio (€)</label><input id="f7" type="number" placeholder="499"/></div>
    <div class="field"><label>Modalidad</label>
      <select id="f8">
        <option value="mensual">Suscripción mensual</option>
        <option value="pago único">Pago único</option>
        <option value="por proyecto">Por proyecto</option>
      </select>
    </div>
  </div>
  <button class="btn" id="genBtn" onclick="generar()">✦ Generar propuesta con IA</button>
  <div class="loading" id="loading"><div class="spinner"></div>Generando tu propuesta...</div>
  <div class="result" id="resultBox">
    <div class="result-top"><span>✓ Propuesta lista</span><button class="copy-btn" onclick="copiar()">Copiar</button></div>
    <div class="result-text" id="resultText"></div>
  </div>
</div>
<script>
function generar() {
  var v1 = document.getElementById('f1').value || 'Mi Empresa';
  var v2 = document.getElementById('f2').value || 'El equipo';
  var v3 = document.getElementById('f3').value || 'el cliente';
  var v4 = document.getElementById('f4').value || 'su sector';
  var v5 = document.getElementById('f5').value || 'mejorar su negocio';
  var v6 = document.getElementById('f6').value || 'nuestros servicios';
  var v7 = document.getElementById('f7').value || '499';
  var v8 = document.getElementById('f8').value;
  var btn = document.getElementById('genBtn');
  var loading = document.getElementById('loading');
  var box = document.getElementById('resultBox');
  var out = document.getElementById('resultText');
  btn.disabled = true;
  loading.style.display = 'block';
  box.style.display = 'none';
  var prompt = 'Eres experto en propuestas comerciales B2B. Redacta una propuesta COMPLETA y persuasiva con estos datos:\n- Empresa vendedora: ' + v1 + ', representada por ' + v2 + '\n- Cliente: ' + v3 + ' del sector ' + v4 + '\n- Problema del cliente: ' + v5 + '\n- Servicio ofrecido: ' + v6 + '\n- Precio: ' + v7 + ' EUR (' + v8 + ')\nIncluye: saludo personalizado, diagnostico, solucion propuesta, 4 entregables, precio, por que elegirnos y llamada a la accion. Maximo 400 palabras. Sin simbolos markdown.';
  fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({prompt: prompt})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var txt = '';
    if (d && d.content && d.content.length > 0 && d.content[0].text) {
      txt = d.content[0].text;
    } else if (d && d.error) {
      txt = 'Error: ' + (d.error.message || d.error);
    } else {
      txt = JSON.stringify(d);
    }
    out.textContent = txt;
    box.style.display = 'block';
    box.scrollIntoView({behavior:'smooth'});
  })
  .catch(function(e){
    out.textContent = 'Error de conexion: ' + e.message;
    box.style.display = 'block';
  })
  .finally(function(){
    loading.style.display = 'none';
    btn.disabled = false;
  });
}
function copiar() {
  navigator.clipboard.writeText(document.getElementById('resultText').textContent).then(function(){
    var b = document.querySelector('.copy-btn');
    b.textContent = 'Copiado';
    setTimeout(function(){ b.textContent = 'Copiar'; }, 2000);
  });
}
</script>
</body>
</html>
